name: Enforce .llmignore

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  check-llmignore:
    name: Check .llmignore for plans/ entry
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify .llmignore exists
        run: |
          if [ ! -f .llmignore ]; then
            echo "Error: .llmignore not found. Add .llmignore with 'plans/' entry." >&2
            exit 1
          fi

      - name: Verify plans/ is ignored
        run: |
          if ! grep -qE '^plans/?(\*\*)?$' .llmignore; then
            echo "Error: .llmignore must include an entry for 'plans/' or 'plans/**'" >&2
            echo "Please add a line 'plans/' to .llmignore to opt-out plans directory from LLM scans." >&2
            exit 1
          fi

      - name: Success
        run: echo ".llmignore contains plans/ — OK"