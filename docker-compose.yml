services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - AGENT_API_URL=http://backend:8000
      - NEXT_PUBLIC_AGENT_API_URL=${NEXT_PUBLIC_AGENT_API_URL:-http://localhost:8000}
    depends_on:
      - backend
    networks:
      - happynest-network
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: agent/Dockerfile
    ports:
      - "8080:8000"
    environment:
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - CAG_API_HOST=0.0.0.0
      - CAG_API_PORT=8000
      - CAG_API_CORS_ORIGINS=${CAG_API_CORS_ORIGINS:-http://localhost:3000}
    networks:
      - happynest-network
    restart: unless-stopped

networks:
  happynest-network:
    driver: bridge
