services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - AGENT_API_URL=http://backend:8000
      - NEXT_PUBLIC_AGENT_API_URL=${NEXT_PUBLIC_AGENT_API_URL:-http://localhost:8000}
    depends_on:
      - backend
    networks:
      - happynest-network
      - coolify
    restart: unless-stopped
    labels:
      - caddy=new.happynestfarm.in
      - caddy.reverse_proxy={{upstreams 3000}}

  backend:
    build:
      context: .
      dockerfile: agent/Dockerfile
    expose:
      - "8000"
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - CAG_API_HOST=0.0.0.0
      - CAG_API_PORT=8000
      - CAG_API_CORS_ORIGINS=${CAG_API_CORS_ORIGINS:-http://localhost:3000}
    networks:
      - happynest-network
    restart: unless-stopped

networks:
  happynest-network:
    driver: bridge
  coolify:
    external: true
